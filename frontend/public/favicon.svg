<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cylinder body -->
  <rect x="4" y="10" width="24" height="14" fill="#1e40af"/>
  <!-- Bottom ellipse -->
  <ellipse cx="16" cy="24" rx="12" ry="4" fill="#1d4ed8"/>
  <!-- Middle ring -->
  <ellipse cx="16" cy="17" rx="12" ry="4" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
  <!-- Top ellipse (lid) -->
  <ellipse cx="16" cy="10" rx="12" ry="4" fill="#3b82f6"/>
  <!-- Shine on top -->
  <ellipse cx="13" cy="9" rx="4" ry="1.5" fill="#93c5fd" opacity="0.5"/>
</svg>
